services:
  frp-client:
    build:
      context: ..
      dockerfile: client/Dockerfile
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    env_file: .env
    volumes:
      - ./config/frpc.toml:/etc/frp/frpc.toml:ro
      # 启用 Hysteria2 时取消注释 / Uncomment if using Hysteria2:
      # - ./config/hysteria2.yaml:/etc/hysteria2/hysteria2.yaml:ro
      - frp-data:/var/lib/frp
      - frp-logs:/var/log/frp

volumes:
  frp-data:
  frp-logs:
