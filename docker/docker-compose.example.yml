# =============================================================================
# FRP Tunnel — Pre-built Image Example / FRP 隧道 — 预构建镜像示例
# =============================================================================
# 使用方法 / Quick start:
#   1. cp docker-compose.example.yml docker-compose.yml
#   2. cp client/.env.example client/.env  (或 server/.env.example server/.env)
#   3. cp client/config/frpc.toml.example client/config/frpc.toml
#      (或 server/config/frps.toml.example server/config/frps.toml)
#   4. 编辑 .env 和 toml 配置 / Edit .env and toml config
#   5. docker compose --profile client up -d  (或 --profile server)
#
# 镜像由 GitHub Actions 自动构建，托管在 ghcr.io
# Images are built by GitHub Actions and hosted on ghcr.io
# 如果 GitHub 用户名不同，替换 "danehou" / Replace "danehou" if different
# =============================================================================

services:
  # === FRP 客户端 (部署在中国端) / FRP Client (deploy on China side) ===
  frp-client:
    image: ghcr.io/danehou/frp-client:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    env_file: client/.env
    volumes:
      - ./client/config/frpc.toml:/etc/frp/frpc.toml:ro
      # 启用 Hysteria2 时取消注释 / Uncomment if using Hysteria2:
      # - ./client/config/hysteria2.yaml:/etc/hysteria2/hysteria2.yaml:ro
      - frp-client-data:/var/lib/frp
      - frp-client-logs:/var/log/frp
    profiles:
      - client

  # === FRP 服务端 (部署在美国端) / FRP Server (deploy on US side) ===
  frp-server:
    image: ghcr.io/danehou/frp-server:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    env_file: server/.env
    volumes:
      - ./server/config/frps.toml:/etc/frp/frps.toml:ro
      # 启用 Hysteria2 时取消注释 / Uncomment if using Hysteria2:
      # - ./server/config/hysteria2-server.yaml:/etc/hysteria2/hysteria2-server.yaml:ro
      - frp-server-data:/var/lib/frp
      - frp-server-logs:/var/log/frp
    profiles:
      - server

volumes:
  frp-client-data:
  frp-client-logs:
  frp-server-data:
  frp-server-logs:
