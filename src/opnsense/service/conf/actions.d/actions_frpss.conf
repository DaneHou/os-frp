[start]
command:/usr/local/etc/rc.d/frp_ssserver start
parameters:
type:script
message:starting Shadowsocks server

[stop]
command:/usr/local/etc/rc.d/frp_ssserver stop
parameters:
type:script
message:stopping Shadowsocks server

[restart]
command:/usr/local/etc/rc.d/frp_ssserver restart
parameters:
type:script
message:restarting Shadowsocks server

[status]
command:/usr/local/etc/rc.d/frp_ssserver status;exit 0
parameters:
type:script_output
message:request Shadowsocks server status

[reconfigure]
command:/usr/local/etc/rc.d/frp_ssserver restart
parameters:
type:script
message:reconfiguring Shadowsocks server
description:Reconfigure Shadowsocks server
