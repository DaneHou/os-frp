[start]
command:/usr/local/etc/rc.d/frp start
parameters:
type:script
message:starting FRP

[stop]
command:/usr/local/etc/rc.d/frp stop
parameters:
type:script
message:stopping FRP

[restart]
command:/usr/local/etc/rc.d/frp restart
parameters:
type:script
message:restarting FRP

[status]
command:/usr/local/etc/rc.d/frp status;exit 0
parameters:
type:script_output
message:request FRP status

[reconfigure]
command:/usr/local/opnsense/scripts/OPNsense/Frp/apply_tuning.sh;/usr/local/etc/rc.d/frp restart
parameters:
type:script
message:reconfiguring FRP
description:Reconfigure FRP service

[apply_tuning]
command:/usr/local/opnsense/scripts/OPNsense/Frp/apply_tuning.sh
parameters:
type:script
message:applying FRP network tuning
