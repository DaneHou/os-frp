services:
  frp-client:
    build:
      context: ..
      dockerfile: client/Dockerfile
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config/frpc.toml:/etc/frp/frpc.toml:ro
      # Uncomment if using Hysteria2:
      # - ./config/hysteria2.yaml:/etc/hysteria2/hysteria2.yaml:ro
      - frp-data:/var/lib/frp
      - frp-logs:/var/log/frp
    environment:
      - FRP_MODE=client
      - FRP_WATCHDOG_ENABLED=true
      - HYSTERIA2_ENABLED=false
      - SHADOW_TLS_ENABLED=false
      # Shadow-TLS settings (when enabled)
      - SHADOW_TLS_SERVER=
      - SHADOW_TLS_PASSWORD=
      - SHADOW_TLS_SNI=www.microsoft.com
      - SHADOW_TLS_LISTEN=127.0.0.1:1234
      # Transport probe (for QUIC vs TCP auto-switching)
      - FRP_SERVER_ADDR=
      - FRP_SERVER_PORT=7000
      - FRP_QUIC_PORT=
      # Admin API (for health checks)
      - FRP_ADMIN_ADDR=127.0.0.1
      - FRP_ADMIN_PORT=7400
      - FRP_ADMIN_USER=
      - FRP_ADMIN_PWD=
      - FRP_HEALTH_CHECK_URL=
    env_file:
      - ../.env

volumes:
  frp-data:
  frp-logs:
